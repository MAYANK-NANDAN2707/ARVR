<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>VR Car Game - STEM Lab</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <script>
    AFRAME.registerComponent('car-controls', {
      init: function () {
        this.speed = 0;
        this.rotation = 0;

        window.addEventListener('keydown', (e) => {
          if (e.key === 'w') this.speed = -0.1;
          if (e.key === 's') this.speed = 0.1;
          if (e.key === 'a') this.rotation = 2;
          if (e.key === 'd') this.rotation = -2;
        });

        window.addEventListener('keyup', (e) => {
          this.speed = 0;
          this.rotation = 0;
        });
      },

      tick: function () {
        let rotation = this.el.getAttribute('rotation');
        rotation.y += this.rotation;
        this.el.setAttribute('rotation', rotation);

        let direction = new THREE.Vector3();
        this.el.object3D.getWorldDirection(direction);

        let position = this.el.getAttribute('position');
        position.x += direction.x * this.speed;
        position.z += direction.z * this.speed;

        this.el.setAttribute('position', position);
      }
    });

    AFRAME.registerComponent('collect', {
      init: function () {
        this.el.addEventListener('click', () => {
          this.el.setAttribute('visible', false);
          alert("Collected!");
        });
      }
    });
  </script>
</head>

<body>
  <a-scene>

    <!-- Sky -->
    <a-sky color="#0f172a"></a-sky>

    <!-- CAR (Player) -->
    <a-entity id="car" position="0 0 -3" car-controls>

      <!-- Car Body -->
      <a-box width="1.5" height="0.5" depth="3" color="red"></a-box>

      <!-- Wheels -->
      <a-cylinder radius="0.3" height="0.3" position="-0.7 -0.3 1"></a-cylinder>
      <a-cylinder radius="0.3" height="0.3" position="0.7 -0.3 1"></a-cylinder>
      <a-cylinder radius="0.3" height="0.3" position="-0.7 -0.3 -1"></a-cylinder>
      <a-cylinder radius="0.3" height="0.3" position="0.7 -0.3 -1"></a-cylinder>

      <!-- Camera (3rd person follow) -->
      <a-entity camera position="0 3 6"></a-entity>

    </a-entity>

    <!-- Ground -->
    <a-plane rotation="-90 0 0" width="50" height="50" color="#1e293b"></a-plane>

    <!-- Collectibles -->
    <a-sphere position="5 1 -10" color="yellow" collect></a-sphere>
    <a-sphere position="-5 1 -15" color="yellow" collect></a-sphere>
    <a-sphere position="0 1 -20" color="yellow" collect></a-sphere>

    <!-- Obstacles -->
    <a-box position="3 0.5 -8" color="blue"></a-box>
    <a-box position="-3 0.5 -12" color="blue"></a-box>

    <!-- Text -->
    <a-text value="VR Car Game 🚗"
      position="0 5 -6"
      align="center"
      color="#00FFF7"
      width="10">
    </a-text>

    <a-text value="WASD to Drive | Click Yellow Balls"
      position="0 4 -6"
      align="center"
      color="white"
      width="8">
    </a-text>

  </a-scene>
</body>

</html>
