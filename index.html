<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Meta Quest 3 Passthrough Interior Design</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #1b416f 0%, #11548c 45%, #5e9cc8 100%);
      color: #fff;
      overflow: hidden;
    }
    a-scene {
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      background: transparent;
    }
    .hud {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: white;
      font-family: Arial, sans-serif;
    }
    .hud button, .hud label, .hud input, .hud select {
      background: rgba(0, 0, 0, 0.66);
      border: 1px solid #ddd;
      color: #fff;
      font-size: 13px;
      padding: 6px 8px;
      border-radius: 5px;
    }
    #message { position: fixed; top: 10px; left: 10px; right:10px; color: #0f0; z-index: 11; }
  </style>
  <script>
    AFRAME.registerComponent('room-scan-place', {
      init: function () {
        this.hitTestSource = null;
        this.viewerSpace = null;
        this.reticle = document.createElement('a-entity');
        this.reticle.setAttribute('geometry', { primitive: 'ring', radiusInner: 0.05, radiusOuter: 0.08 });
        this.reticle.setAttribute('material', { color: '#00ffcc', shader: 'flat', opacity: 0.8 });
        this.reticle.object3D.rotation.x = -Math.PI / 2;
        this.reticle.setAttribute('visible', 'false');
        this.el.appendChild(this.reticle);

        this.selected = null;
        this.activeFurniture = null;

        this.furnitureCatalog = [
          { id: 'sofa', type: 'box', color: '#A0522D', width: 1.5, height: 0.6, depth: 0.8 },
          { id: 'table', type: 'box', color: '#8B4513', width: 1.2, height: 0.45, depth: 0.7 },
          { id: 'lamp', type: 'cylinder', color: '#FFD700', radius: 0.12, height: 0.8 }
        ];

        document.querySelector('#placeBtn').addEventListener('click', this.placeFurniture.bind(this));
        document.querySelector('#clearBtn').addEventListener('click', () => this.clearFurniture());
        document.querySelector('#catalog').addEventListener('change', (ev) => this.selectCatalog(ev.target.value));
        document.querySelector('#move').addEventListener('input', (ev) => this.transform('x', ev.target.value));
        document.querySelector('#rotate').addEventListener('input', (ev) => this.transform('rotation', ev.target.value));
        document.querySelector('#scale').addEventListener('input', (ev) => this.transform('scale', ev.target.value));

        this.selectCatalog('sofa');

        this.el.sceneEl.addEventListener('enter-vr', () => this.setupHitTest());
      },

      setupHitTest: async function () {
        const session = this.el.sceneEl.renderer.xr.getSession();
        if (!session) return;

        this.viewerSpace = await session.requestReferenceSpace('viewer');
        // Prefer local-floor for grounded placement in case passthrough has slight height drift.
        this.floorSpace = await session.requestReferenceSpace('local-floor').catch(() => null);
        this.hitTestSource = await session.requestHitTestSource({ space: this.viewerSpace }).catch(() => null);

        if (this.hitTestSource) {
          this.showMessage('Room scan active: move head to detect floor surfaces.');
        } else {
          this.showMessage('Hit test not available; using manual fallback placement. Aim center and tap Place.');
        }
      },

      placeFurniture: function () {
        let placePos = this.reticle.getAttribute('position');
        let placeRot = this.reticle.getAttribute('rotation');

        if (!this.reticle.getAttribute('visible')) {
          const camera = this.el.sceneEl.camera;
          if (camera) {
            const camPos = new THREE.Vector3();
            const camDir = new THREE.Vector3();
            camera.getWorldPosition(camPos);
            camera.getWorldDirection(camDir);
            placePos = camPos.clone().add(camDir.multiplyScalar(2.0));
            placeRot = { x: 0, y: 0, z: 0 };
            this.showMessage('Hit-test failed; using 2m front fallback placement.');
          } else {
            this.showMessage('Move camera to find floor surface first.');
            return;
          }
        }

        const item = document.createElement('a-entity');

        if (this.activeFurniture.type === 'box') {
          item.setAttribute('geometry', {
            primitive: 'box',
            width: this.activeFurniture.width,
            height: this.activeFurniture.height,
            depth: this.activeFurniture.depth
          });
        } else if (this.activeFurniture.type === 'cylinder') {
          item.setAttribute('geometry', {
            primitive: 'cylinder',
            radius: this.activeFurniture.radius,
            height: this.activeFurniture.height
          });
        }

        item.setAttribute('material', { color: this.activeFurniture.color, metalness: 0.2, roughness: 0.8 });
        item.setAttribute('position', this.reticle.getAttribute('position'));
        item.setAttribute('rotation', this.reticle.getAttribute('rotation'));
        item.setAttribute('scale', '1 1 1');
        item.setAttribute('class', 'furniture');
        item.setAttribute('hoverable', '');
        item.addEventListener('click', () => this.setSelected(item));

        this.el.appendChild(item);
        this.setSelected(item);
        this.showMessage('Placed: ' + this.activeFurniture.id + '. Tap to select and adjust.');
      },

      setSelected: function (item) {
        const previous = this.selected;
        if (previous) previous.setAttribute('material', 'opacity', 1);

        this.selected = item;
        item.setAttribute('material', 'opacity', 0.85);

        const pos = item.getAttribute('position').x;
        const rot = item.getAttribute('rotation').y;
        const scale = item.getAttribute('scale').x;

        document.querySelector('#move').value = pos.toFixed(2);
        document.querySelector('#rotate').value = rot;
        document.querySelector('#scale').value = scale.toFixed(2);
      },

      transform: function (mode, value) {
        if (!this.selected) return;
        if (mode === 'x') {
          const p = this.selected.getAttribute('position');
          p.x = parseFloat(value);
          this.selected.setAttribute('position', p);
        } else if (mode === 'rotation') {
          const r = this.selected.getAttribute('rotation');
          r.y = parseFloat(value);
          this.selected.setAttribute('rotation', r);
        } else if (mode === 'scale') {
          const s = parseFloat(value);
          this.selected.setAttribute('scale', { x: s, y: s, z: s });
        }
      },

      selectCatalog: function (id) {
        this.activeFurniture = this.furnitureCatalog.find(x => x.id === id) || this.furnitureCatalog[0];
        this.showMessage('Selected: ' + this.activeFurniture.id + '. Aim at floor and tap Place.');
      },

      clearFurniture: function () {
        const nodes = this.el.querySelectorAll('.furniture');
        nodes.forEach(n => n.parentNode.removeChild(n));
        this.selected = null;
        this.showMessage('All virtual furniture cleared.');
      },

      showMessage: function (text) {
        const msg = document.querySelector('#message');
        msg.textContent = text;
      },

      tick: function (time, frame) {
        if (!frame) return;

        const referenceSpace = this.floorSpace || this.el.sceneEl.renderer.xr.getReferenceSpace();

        if (this.hitTestSource) {
          const hitTestResults = frame.getHitTestResults(this.hitTestSource);
          if (hitTestResults.length > 0) {
            const pose = hitTestResults[0].getPose(referenceSpace);
            this.reticle.setAttribute('position', pose.transform.position);
            this.reticle.setAttribute('rotation', pose.transform.orientation);
            this.reticle.setAttribute('visible', true);
            return;
          }
        }

        // Fallback when hit-test fails or is unsupported: show reticle 2m in front of camera
        const camera = this.el.sceneEl.camera;
        if (camera) {
          const camPos = new THREE.Vector3();
          const camDir = new THREE.Vector3();
          camera.getWorldPosition(camPos);
          camera.getWorldDirection(camDir);
          const fallbackPos = camPos.clone().add(camDir.multiplyScalar(2.0));
          this.reticle.setAttribute('position', fallbackPos);
          this.reticle.setAttribute('rotation', '0 0 0');
          this.reticle.setAttribute('visible', true);
          this.showMessage('No floor hit-test yet, using 2m front fallback.');
        }
      }
    });

    AFRAME.registerComponent('hoverable', {
      init: function () {
        this.el.addEventListener('mouseenter', () => {
          this.el.object3D.scale.set(1.05, 1.05, 1.05);
        });
        this.el.addEventListener('mouseleave', () => {
          this.el.object3D.scale.set(1, 1, 1);
        });
      }
    });

    // WebXR support check for fallback behavior
    window.addEventListener('DOMContentLoaded', async () => {
      const message = document.querySelector('#message');
      const fallback = document.querySelector('#fallback-box');
      if (!navigator.xr) {
        message.textContent = 'WebXR not available. Fallback 3D preview active. Use Quest 3 in VR browser for passthrough AR.';
        fallback.setAttribute('visible', true);
        return;
      }

      const isSupported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
      if (!isSupported) {
        message.textContent = 'immersive-ar not supported on this device. Fallback 3D preview active. Use Quest 3 headset for real passthrough.';
        fallback.setAttribute('visible', true);
      } else {
        message.textContent = 'AR supported! Enter AR mode in Quest 3 and scan floor for placement.';
        fallback.setAttribute('visible', false);
      }
    });
  </script>

<body>
  <a-scene
    id="arScene"
    embedded
    xr-mode-ui="enabled: true"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    webxr="requiredFeatures: hit-test, local-floor, dom-overlay, passthrough; overlayElement: #overlay"
    room-scan-place
  >

    <a-entity camera look-controls position="0 1.6 0">
      <a-cursor color="#ff0" fuse="false"></a-cursor>
    </a-entity>

    <a-light type="ambient" intensity="0.75"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.45"></a-light>

    <!-- Subtle virtual backdrop for better orientation in passthrough mode -->
    <a-sky color="#a2c1f0" material="shader: flat; opacity: 0.25"></a-sky>
    <a-entity geometry="primitive: plane; width: 20; height: 20" rotation="-90 0 0" position="0 0 0" material="color: #e8f0ff; opacity: 0.18; shader: flat"></a-entity>

    <!-- Desktop fallback object for non-passthrough demos -->
    <a-box id="fallback-box" position="0 1 -3" rotation="0 45 0" color="#4CC3D9" depth="0.8" height="0.8" width="0.8"></a-box>

  </a-scene>

  <div id="overlay" style="position:fixed; top:0; left:0; right:0; height:36px; background:#0008; display:flex; align-items:center; justify-content:center; color:#fff; z-index: 5; font-size: 14px;">Meta Quest 3 Passthrough AR - Room Scan + Furniture</div>

  <div id="message">Ready to scan. Put on headset and point to floor.</div>

  <div class="hud">
    <div>
      <label>Item</label><select id="catalog">
        <option value="sofa">Sofa</option>
        <option value="table">Table</option>
        <option value="lamp">Lamp</option>
      </select>
    </div>
    <button id="placeBtn">Place in Room</button>
    <button id="clearBtn">Clear All</button>
    <div>
      <label>Move X</label><input id="move" type="range" min="-2" max="2" step="0.05" value="0" />
    </div>
    <div>
      <label>Rotate Y</label><input id="rotate" type="range" min="0" max="360" step="1" value="0" />
    </div>
    <div>
      <label>Scale</label><input id="scale" type="range" min="0.3" max="2" step="0.05" value="1" />
    </div>
  </div>

  <div style="position:fixed; bottom:60px; left:10px; color:#fff; font-size:12px; z-index:4;">Use your controller/hand select to tap objects for edit mode. UI controls update selected model in real time. Enjoy preview before purchase.</div>
</body>
</html>
